<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shadow DOM Test Page</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 32px;
        line-height: 1.5;
      }
      section {
        margin: 0 0 32px;
        padding: 16px;
        border: 1px solid CanvasText;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Shadow DOM Test Page</h1>
      <p>This page tests extension compatibility with elements inside open Shadow DOMs.</p>

      <section>
        <h2>Custom Element with Shadow DOM (YouTube Logo Mock)</h2>
        <div id="youtube-logo-host"></div>
      </section>

      <section>
        <h2>Form Controls in Shadow DOM</h2>
        <div id="form-controls-host"></div>
      </section>

      <section>
        <h2>Nested Shadow DOM</h2>
        <div id="nested-shadow-host"></div>
      </section>
    </main>

    <script>
      // 1. YouTube Logo Mock (Link inside Shadow DOM)
      const logoHost = document.getElementById("youtube-logo-host");
      const logoShadow = logoHost.attachShadow({ mode: "open" });
      logoShadow.innerHTML = `
        <a href="#youtube-home" style="display: inline-flex; align-items: center; text-decoration: none; color: red; font-size: 24px; font-weight: bold;">
          <svg viewBox="0 0 24 24" style="width: 36px; height: 36px; fill: red; margin-right: 8px;">
            <path d="M23,12A11,11 0 0,0 12,1A11,11 0 0,0 1,12A11,11 0 0,0 12,23A11,11 0 0,0 23,12M10,17V7L16,12L10,17Z" />
          </svg>
          Mock YouTube Link
        </a>
      `;

      // 2. Form Controls (Button & Input inside Shadow DOM)
      const formHost = document.getElementById("form-controls-host");
      const formShadow = formHost.attachShadow({ mode: "open" });
      formShadow.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 8px; max-width: 300px;">
          <input type="text" placeholder="Input inside Shadow DOM" />
          <button type="button" id="shadow-btn">Button inside Shadow DOM</button>
        </div>
      `;
      formShadow.getElementById("shadow-btn").addEventListener("click", () => {
        alert("Shadow DOM button clicked!");
      });

      // 3. Nested Shadow DOM (Host containing a Host)
      const nestedHost = document.getElementById("nested-shadow-host");
      const nestedShadow = nestedHost.attachShadow({ mode: "open" });
      nestedShadow.innerHTML = `
        <div style="padding: 10px; border: 1px dashed blue;">
          <h3>Outer Shadow DOM</h3>
          <div id="inner-host"></div>
        </div>
      `;
      const innerHost = nestedShadow.getElementById("inner-host");
      const innerShadow = innerHost.attachShadow({ mode: "open" });
      innerShadow.innerHTML = `
        <div style="padding: 10px; border: 1px dotted green;">
          <h4>Inner Shadow DOM</h4>
          <a href="#nested-link">Link inside nested Shadow DOM</a>
        </div>
      `;
    </script>
  </body>
</html>
