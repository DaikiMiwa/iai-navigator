<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Body Scroll Container Test</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100%;
        overflow: hidden;
      }

      body {
        box-sizing: border-box;
        height: 100%;
        margin: 0;
        overflow-y: auto;
        padding: 32px;
      }

      main {
        max-width: 760px;
      }

      .spacer {
        min-height: 110vh;
        border-block: 1px dashed color-mix(in srgb, CanvasText 30%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1 id="top">Body Scroll Container Test</h1>
      <p>
        The window does not scroll on this page; the body element is the scroll
        surface. Use j/k, gg, and Shift+G.
      </p>
      <p><a href="#middle">Middle link</a></p>
      <p><a href="#bottom">Bottom link</a></p>

      <div class="spacer" id="middle">
        <h2>Middle</h2>
        <p>j/k should move the body scroll container.</p>
        <p><a href="#top">Top link</a></p>
      </div>

      <div class="spacer" id="bottom">
        <h2>Bottom</h2>
        <p>gg should return to the top. Shift+G should return here.</p>
        <p><a href="#top">Top link</a></p>
      </div>
    </main>
  </body>
</html>
